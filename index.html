<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my wipsait</title>

    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial;
        background: linear-gradient(135deg,#667eea,#764ba2);
        min-height:100vh;
        display:flex;
        justify-content:center;
        padding:20px;
        opacity: 0;
        animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
        }
    }

    .container{
        width:100%;
        max-width:1100px;
        background:white;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 20px 40px rgba(0,0,0,0.2);
        animation: slideIn 0.8s ease-out forwards;
    }

    @keyframes slideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    /* الهيدر */
    .header-section{
        text-align:center;
        padding:50px 20px;
        background: linear-gradient(45deg,#ff6b6b,#feca57);
        color:white;
        animation: fadeIn 1s forwards 0.5s;
    }

    .header-section h1{
        font-size:3rem;
    }

    .header-section h2{
        font-size:2rem;
        margin-top:10px;
    }

    .header-images{
        display:flex;
        justify-content:center;
        gap:20px;
        margin-top:30px;
        flex-wrap:wrap;
        animation: slideIn 1s ease-out forwards 1s;
    }

    .header-images img{
        width:240px;
        height:240px;
        object-fit:cover;
        border-radius:15px;
        box-shadow:0 10px 20px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .header-images img:hover{
        transform:scale(1.05);
    }

    .info-section{
        text-align:center;
        padding:50px 20px;
        background:#f8f9fa;
        animation: fadeIn 1s forwards 1.5s;
    }

    .info-text{
        max-width:9x;
        margin:auto;
        color:#555;
        line-height:1.8;
    }

    /* الصور */
    .info-section img{
        width:100%;
        max-width:900px;
        height:auto;
        display:block;
        margin:20px auto;
    }

    .gallery-section{
        padding:50px 20px;
        display:flex;
        flex-direction:column;
        gap:40px;
        align-items:center;
        animation: fadeIn 1s forwards 2s;
    }

    .images-container{
        display:flex;
        gap:20px;
        justify-content:center;
        flex-wrap:wrap;
        width:100%;
        animation: slideIn 1s ease-out forwards 2.5s;
    }

    .gallery-img{
        width:260px;
        height:260px;
        object-fit:cover;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .gallery-img:hover{
        transform:scale(1.05);
    }

    .contact-btn{
        width: 40px;
        height: 40px;
        background: #ff6b6b;
        color: white;
        text-align: center;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.5rem;
        margin-top: 20px;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10;
    }

    .contact-btn:before{
        content: '☰';
        font-size: 30px;
        color: white;
    }

    .contact-box{
        display: none;
        position: fixed;
        bottom: 80px;
        right: 20px;
        background-color: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        z-index: 1000;
        text-align: center;
        width: 80%;
        max-width: 400px;
    }

    .social-btn{
        display: block;
        width: 180px;
        margin: 10px auto;
        padding: 10px;
        border-radius: 5px;
        text-decoration: none;
        color: white;
        background-color: #3b5998;
        text-align: center;
    }

    .social-btn.instagram{
        background-color: #e4405f;
    }

    .social-btn.whatsapp{
        background-color: #25D366;
    }

    .contact-btn.active + .contact-box{
        display: block;
    }

    /* 📱 الموبايل */
    @media(max-width:1000px){

        .header-images{
            flex-direction:column;
            align-items:center;
        }

        .header-images img{
            width:80%;
            height:auto;
        }

        .images-container{
            flex-direction:column;
            align-items:center;
        }

        .gallery-img{
            width:90%;
            height:auto;
        }

        /* 👇 حل تكبير الصور في الموبايل */
        .info-section img{
            width:100%;
            max-width:none;
            height:auto;
        }

        .header-section h1{
            font-size:2.2rem;
        }

        .header-section h2{
            font-size:1.5rem;
        }
    }
    </style>

</head>

<body>

<div class="container">

    <div class="header-section">
        <h1>Dr: Amin Elhosainy</h1>
        <h2>كورس الحجامة والتدليك</h2>

        <div class="header-images">
            <img src="image/amin.jpg">
            <img src="image/amin2.jpg">
        </div>
    </div>

    <div class="info-section">
        <h3>معلومات</h3>
        <img src="image/fonttt.jpg">

        <h3>مميزات الكورس</h3>
        <img src="image/font.jpg">
    </div>

    <div class="gallery-section">

        <div class="images-container">
            <img src="image/dama3.jpg?w=500" class="gallery-img">
            <img src="image/dam1.jpg?w=500" class="gallery-img">
            <img src="image/dam4.jpg?w=500" class="gallery-img">
            <img src="image/dama5.jpg?w=500" class="gallery-img">
        </div>

        <div class="content-box">
            <h3>العنوان والحجز</h3>
            <p>المنيا شلبي سنتر التقوي للتاهيل الحركي</p>
            <h3>للحجز والاستعلام</h3>
            <p>01009017045</p>
        </div>

        <div class="contact-btn"></div>

        <div class="contact-box">
            <h3>تابع المطور</h3>
            <a class="social-btn facebook" href="https://facebook.com" target="_blank">فيسبوك</a>
            <a class="social-btn instagram" href="https://instagram.com" target="_blank">إنستجرام</a>
            <a class="social-btn whatsapp" href="https://wa.me/201234567890" target="_blank">واتساب</a>
        </div>

    </div>

</div>

<script>
document.querySelector('.contact-btn').addEventListener('click', function() {
    this.classList.toggle('active');
});
</script>

</body>
</html>
